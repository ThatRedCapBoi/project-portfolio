name: Deploy to GitHub Pages

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]          # deploy on every push to main
  workflow_dispatch:           # also allow manual trigger from the Actions tab

# ── Permissions ─────────────────────────────────────────────────────────────
# The deploy job needs write access to the special github-pages environment.
permissions:
  contents: read
  pages: write
  id-token: write             # required by actions/deploy-pages for OIDC auth

# ── Concurrency ──────────────────────────────────────────────────────────────
# Only one deploy runs at a time; don't cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NODE_ENV: production
          # Pass the GitHub repo name so next.config.js can set basePath.
          # For a root user/org site (username.github.io), leave REPO_NAME
          # empty by deleting the line below and the basePath logic in config.
          REPO_NAME: ${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # next build with output:'export' writes to ./out
          path: ./out

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    # Ties this job to the github-pages deployment environment so GitHub
    # shows the deployment URL and deployment history in the repo UI.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
